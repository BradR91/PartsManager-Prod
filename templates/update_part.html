<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Part - PartsManager</title>
    <link rel="stylesheet" href="/public/style.css">
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Update Part</h1>
        <a href="/parts/" class="btn">Back to Parts List</a>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, message in messages %}
      <div class="message message-{{ category }}">{{ message }}</div>
      {% endfor %} {% endif %} {% endwith %}

      <form method="POST" action="/parts/update/{{ part.ID }}" class="form">
        <div class="form-group">
          <label for="part_no">Part Number:</label>
          <input
            type="text"
            id="part_no"
            name="part_no"
            value="{{ part.PartNo }}"
            required
          />
        </div>

        <div class="form-group">
          <label for="part_desc">Part Description:</label>
          <input
            type="text"
            id="part_desc"
            name="part_desc"
            value="{{ part.PartDesc }}"
            required
          />
        </div>

        <button type="submit" class="btn">Update Part</button>
      </form>
    </div>
  </body>
</html>
